<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#1e293b,#0f172a);
        font-family:Arial,sans-serif;
    }

    .register-card{
        width:420px;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
        animation:fadeIn 0.8s ease;
    }

    .register-card h2{
        text-align:center;
        margin-bottom:30px;
        font-weight:bold;
        color:#0f172a;
    }

    .icon-box{
        text-align:center;
        font-size:55px;
        color:#0f172a;
        margin-bottom:15px;
    }

    .form-control{
        height:50px;
        border-radius:10px;
    }

    .btn-register{
        width:100%;
        height:50px;
        border-radius:10px;
        font-size:18px;
        font-weight:600;
        background:#0f172a;
        border:none;
        transition:0.3s;
    }

    .btn-register:hover{
        background:#1e293b;
        transform:scale(1.02);
    }

    .login-link{
        text-align:center;
        margin-top:20px;
    }

    .alert
                border-radius:10px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

  </style>

</head>

<body>

<div class="register-card">

  <div class="icon-box">
    <i class="bi bi-person-plus-fill"></i>
  </div>

  <h2>Create Account</h2>

  <!-- SUCCESS MESSAGE -->

  <div th:if="${success}"
       class="alert alert-success">

    Registration Successful! Please Login.

  </div>

  <!-- REGISTER FORM -->

  <form th:action="@{/register}"
        method="post"
        th:object="${user}">

    <div class="mb-3">

      <label class="form-label">
        Username
      </label>

      <input type="text"
             th:field="*{username}"
             class="form-control"
             placeholder="Enter username"
             required>

    </div>

    <div class="mb-3">

      <label class="form-label">
        Password
      </label>

      <input type="password"
             th:field="*{password}"
             class="form-control"
             placeholder="Enter password"
             required>

    </div>

    <button type="submit"
            class="btn btn-primary btn-register">

      Register

    </button>

  </form>

  <div class="login-link">

    Already have an account?

    <a href="/login">
      Login
    </a>

  </div>

</div>

</body>

</html>
