<!DOCTYPE html>
<html
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:Arial,sans-serif;
        }

        .login-card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            animation:fadeIn 0.8s ease;
        }

        .login-card h2{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            color:#0f172a;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-login{
            width:100%;
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:600;
            background:#0f172a;
            border:none;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#1e293b;
            transform:scale(1.02);
        }

        .icon-box{
            text-align:center;
            font-size:55px;
            color:#0f172a;
            margin-bottom:15px;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .alert{
            border-radius:10px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="icon-box">
        <i class="bi bi-wallet2"></i>
    </div>

    <h2>Expense Tracker</h2>

    <!-- ERROR MESSAGE -->

    <div th:if="${param.error}"
         class="alert alert-danger">

        Invalid Username or Password

    </div>

    <!-- LOGOUT MESSAGE -->

    <div th:if="${param.logout}"
         class="alert alert-success">

        Logged out successfully

    </div>

    <!-- LOGIN FORM -->

    <form th:action="@{/login}" method="post">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>

        </div>

        <div class="mb-3 form-check">

            <input type="checkbox"
                   class="form-check-input">

            <label class="form-check-label">
                Remember Me
            </label>

        </div>

        <button type="submit"
                class="btn btn-primary btn-login">

            Login

        </button>

    </form>

    <div class="register-link">

        Don't have an account?

        <a href="/register">
            Register
        </a>

    </div>

</div>

</body>

</html>
