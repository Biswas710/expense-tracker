<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expense Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .sidebar{
            height:100vh;
            background:#212529;
            color:white;
            padding-top:20px;
            position:fixed;
            width:240px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .main-content{
            margin-left:240px;
            padding:30px;
        }

        .dashboard-card{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .table-container{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .navbar-custom{
            background:white;
                        padding:15px 25px;
            border-radius:15px;
            margin-bottom:25px;
            box-shadow:0 0 10px rgba(0,0,0,0.08);
        }

        .expense-title{
            font-weight:600;
        }

        .btn-custom{
            border-radius:10px;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h3 class="text-center mb-4">
        <i class="bi bi-wallet2"></i>
        Expense Tracker
    </h3>

    <a href="/expenses">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="/add-expense">
        <i class="bi bi-plus-circle"></i>
        Add Expense
    </a>

    <a href="#">
        <i class="bi bi-bar-chart"></i>
        Analytics
    </a>

    <a href="#">
        <i class="bi bi-person-circle"></i>
        Profile
    </a>

    <a href="/logout">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

    <!-- NAVBAR -->

    <div class="navbar-custom d-flex justify-content-between align-items-center">

        <h3>
            Welcome Back 👋
        </h3>

        <div>
            <i class="bi bi-person-circle fs-3"></i>
        </div>

    </div>

    <!-- DASHBOARD CARDS -->

    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="card dashboard-card shadow-sm p-4">

                <h5>Total Expenses</h5>

                <h2 class="text-primary">
                    ₹<span th:text="${totalExpense}"></span>
                </h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card shadow-sm p-4">

                <h5>This Month</h5>

                <h2 class="text-success">
                    ₹<span th:text="${monthlyExpense}"></span>
                </h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card shadow-sm p-4">

                <h5>Total Transactions</h5>

                <h2 class="text-danger"
                    th:text="${#lists.size(expenses)}">
                </h2>

            </div>

        </div>

    </div>

    <!-- EXPENSE TABLE -->

    <div class="table-container">

        <div class="d-flex justify-content-between mb-3">

            <h4>
                Expense History
            </h4>

            <a href="/add-expense"
               class="btn btn-dark btn-custom">

                <i class="bi bi-plus-circle"></i>
                Add Expense

            </a>

        </div>

        <table class="table table-hover align-middle">

            <thead class="table-dark">

            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="expense : ${expenses}">

                <td class="expense-title"
                    th:text="${expense.title}">
                </td>

                <td class="text-success fw-bold">
                    ₹ <span th:text="${expense.amount}"></span>
                </td>

                <td>
                    <span class="badge bg-primary"
                          th:text="${expense.category}">
                    </span>
                </td>

                <td>

                    <a th:href="@{/edit/{id}(id=${expense.id})}"
                       class="btn btn-warning btn-sm btn-custom">

                        <i class="bi bi-pencil-square"></i>

                    </a>

                    <a th:href="@{/delete/{id}(id=${expense.id})}"
                       class="btn btn-danger btn-sm btn-custom">

                        <i class="bi bi-trash"></i>

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
