<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Expense</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial,sans-serif;
        }

        .sidebar{
            width:240px;
            height:100vh;
            position:fixed;
            background:#212529;
            color:white;
            padding-top:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .main-content{
            margin-left:240px;
            padding:40px;
        }

        .form-card{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
            max-width:700px;
            margin:auto;
            animation:fadeIn 0.7s ease;
        }

        .form-card h2{
            margin-bottom:30px;
            font-weight:bold;
            color:#212529;
        }

        .form-control,
        .form-select{
            height:50px;
            border-radius:10px;
        }

        .btn-save{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:600;
            width:100%;
            transition:0.3s;
        }

        .btn-save:hover{
            transform:scale(1.02);
        }

        .icon-box{
            font-size:55px;
            text-align:center;
            margin-bottom:20px;
            color:#212529;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h3 class="text-center mb-4">
        <i class="bi bi-wallet2"></i>
        Expense Tracker
    </h3>

    <a href="/expenses">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="/add-expense">
        <i class="bi bi-plus-circle"></i>
        Add Expense
    </a>

    <a href="#">
        <i class="bi bi-bar-chart"></i>
        Analytics
    </a>

    <a href="/logout">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

    <div class="form-card">

        <div class="icon-box">
            <i class="bi bi-cash-coin"></i>
        </div>

        <h2 class="text-center">

            <span th:if="${expense.id == null}">
                Add Expense
            </span>

            <span th:if="${expense.id != null}">
                Update Expense
            </span>

        </h2>

        <form th:action="${expense.id == null} ? @{/save-expense} : @{/update-expense}"
              th:object="${expense}"
              method="post">

            <!-- Hidden ID -->

            <input type="hidden"
                   th:field="*{id}">

            <!-- TITLE -->

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Expense Title
                </label>

                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       placeholder="Enter expense title"
                       required>

            </div>

            <!-- AMOUNT -->

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Amount
                </label>

                <input type="number"
                       step="0.01"
                       th:field="*{amount}"
                       class="form-control"
                       placeholder="Enter amount"
                       required>

            </div>

            <!-- CATEGORY -->

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Category
                </label>

                <select th:field="*{category}"
                        class="form-select"
                        required>

                    <option value="">
                        Select Category
                    </option>

                    <option value="Food">
                        🍔 Food
                    </option>

                    <option value="Travel">
                        ✈️ Travel
                    </option>

                    <option value="Shopping">
                        🛒 Shopping
                    </option>

                    <option value="Bills">
                        💡 Bills
                    </option>

                    <option value="Entertainment">
                        🎬 Entertainment
                    </option>

                    <option value="Health">
                        🏥 Health
                    </option>

                    <option value="Other">
                        📦 Other
                    </option>

                </select>

            </div>
            <!-- DATE -->

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Expense Date
                </label>

                <input type="date"
                       th:field="*{date}"
                       class="form-control"
                       required>

            </div>

            <!-- BUTTON -->

            <button type="submit"
                    class="btn btn-dark btn-save">

                <i class="bi bi-check-circle"></i>

                <span th:if="${expense.id == null}">
                    Save Expense
                </span>

                <span th:if="${expense.id != null}">
                    Update Expense
                </span>

            </button>

        </form>

    </div>

</div>

</body>

</html>
